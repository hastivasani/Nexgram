services:
  # ── Backend (Node.js Web Service) ────────────────────────────
  - type: web
    name: nexgram-backend
    runtime: node
    rootDir: Backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false        # set manually in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false        # your frontend URL after deploy
      - key: GNEWS_API_KEY
        sync: false
      - key: NEWSAPI_KEY
        sync: false

  # ── Frontend (Static Site) ────────────────────────────────────
  - type: web
    name: nexgram-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false        # set to your backend URL after deploy
